<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真珠美人魚閃亮問答挑戰！</title>
    <style>
        :root {
            --pink-primary: #ff85a2;
            --pink-light: #ffb3c6;
            --blue-ocean: #a2d2ff;
            --yellow-soft: #fff3b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background: linear-gradient(135deg, var(--blue-ocean), #e8cbf5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 25px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 4px solid var(--pink-light);
        }

        h1 {
            color: var(--pink-primary);
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #777;
            font-size: 13px;
            margin-bottom: 15px;
        }

        /* 音樂播放器區塊 */
        .audio-container {
            background-color: #fff0f5;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px dashed var(--pink-primary);
        }
        .audio-container p {
            margin: 0 0 5px 0;
            font-size: 12px;
            color: var(--pink-primary);
            font-weight: bold;
        }
        audio {
            width: 100%;
            height: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #eee;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--pink-primary), var(--pink-light));
            transition: width 0.3s ease;
        }

        /* 題目圖片容器 */
        .question-image-container {
            width: 100%;
            max-height: 200px;
            background-color: #fafafa;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            display: none; /* 有圖才會打開 */
            justify-content: center;
            align-items: center;
            border: 2px solid #eee;
        }
        .question-image-container img {
            width: 100%;
            height: 100%;
            max-height: 200px;
            object-fit: contain;
        }

        .question-box {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 選項 2x2 網格 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .btn-img-option {
            background-color: white;
            border: 3px solid var(--pink-light);
            border-radius: 15px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-img-option:hover {
            border-color: var(--pink-primary);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* 選項圖片（完整縮放、不切頭） */
        .option-img {
            width: 100%;
            height: 140px;
            object-fit: contain;
            border-radius: 10px;
            background-color: #fafafa;
        }

        .option-label {
            margin-top: 8px;
            font-size: 15px;
            font-weight: bold;
            color: #555;
        }

        /* 答對與答錯的回饋邊框 */
        .btn-img-option.correct {
            border-color: #a7c957 !important;
            background-color: #f4f9e9;
        }
        .btn-img-option.correct .option-label { color: #6a994e; }

        .btn-img-option.wrong {
            border-color: #f28482 !important;
            background-color: #ffeef0;
        }
        .btn-img-option.wrong .option-label { color: #e63946; }

        .result-screen { display: none; }
        .score-text { font-size: 48px; font-weight: bold; color: var(--pink-primary); margin: 20px 0; }
        .comment-text { font-size: 16px; color: #666; margin-bottom: 30px; line-height: 1.5; }
        .btn-restart { background-color: var(--pink-primary); color: white; border: none; border-radius: 12px; padding: 12px 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-screen">
            <h1>用閃亮的歌聲開始大合唱！</h1>
            <div class="subtitle" id="question-number">第 1 / 10 題</div>
            
            <div class="audio-container">
                <p>🎵 背景音樂（我找不到載點 沒有歌曲）</p>
                <audio id="bgm" controls loop>
                    <source src="bgm.mp3" type="audio/mp3">
                </audio>
            </div>
            
            <div class="progress-bar"><div class="progress" id="progress"></div></div>

            <div class="question-image-container" id="question-img-block">
                <img id="quiz-image" src="" alt="題目圖片">
            </div>

            <div class="question-box" id="question">題目載入中...</div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="result-screen" class="result-screen">
            <h1>測驗結束！</h1>
            <div class="score-text" id="score">0 分</div>
            <div class="comment-text" id="comment">評價載入中...</div>
            <button class="btn-restart" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ 10 題經典題庫設定區
        // ==========================================
        const quizData = [
            {
                question: "第 1 題：請問北太平洋的人魚公主（也是本故事的主人翁）是誰？",
                questionImg: "", 
                options: [
                    { text: "", img: "hanon.jpg" },
                    { text: "", img: "karen.jpg" },
                    { text: "", img: "lucia.jpg" },
                    { text: "", img: "coco.jpg" }
                ],
                correct: 2
            },
            {
                question: "第 2 題：這是哪一位公主,
                questionImg: "noel.jpg", 
                options: [
                    { text: "諾威爾"},
                    { text: "香連" },
                    { text: "米兒" },
                    { text: "米凱爾"}
                ],
                correct: 0
            },
            {
                question: "第 3 題：美人魚公主戰鬥前都會說哪一句話？",
                questionImg: "", 
                options: [
                    { text: "用閃亮的歌聲開始大合唱！"},   
                    { text: "用閃亮的歌聲開始現場演唱！"},   
                    { text: "閃亮耀眼的愛之雨下個不停！"},    
                    { text: "狂歡派對，用閃亮的歌聲開始！"}
                ],
                correct: 1
            },
            {
                question: "第 4 題：擁有「水色真珠」，在人間化名為？",
                questionImg: "", 
                options: [
                    { text: "七海波音" },
                    { text: "寶生波音" },
                    { text: "洞院波音" },
                    { text: "珍珠波音" }
                ],
                correct: 1
            },
            {
                question: "第 5 題：總是穿著黑色衣服、負責唱歌和吐槽妹妹的反派「黑美人姐妹花」姐姐是誰？",
                questionImg: "bad.jpg", 
                options: [
                    { text: "瑪莉亞" },
                    { text: "咪咪"},
                    { text: "秀秀"},
                    { text: "愛莉爾"}
                ],
                correct: 2
            },
            {
                question: "第 6 題：圖片中是誰",
                questionImg: "", 
                options: [
                    { text: "海斗"},
                    { text: "理人"},
                    { text: "雅宏"},
                    { text: "凱特"" }
                ],
                correct: 3
            },
            {
                question: "第 7 題：「狂風暴雨的海誰在等待」下一句是?",
                questionImg: "", 
                options: [
                    { text: "我們是堅強的小孩"},
                    { text: "我會努力向前奔跑"},
                    { text: "人生必須不斷奔跑"},
                    { text: "我會努力振作起來"}
                ],
                correct: 0
            },
            {
                question: "第 8 題：圖片中的反派叫什麼名字?",
                questionImg: "馬利亞.jpg", 
                options: [
                    { text: "馬利亞"},
                    { text: "伊茲爾"},
                    { text: "悠莉"},
                    { text: "米兒"}
                ],
                correct: 1
            },
            {
                question: "第 9 題：原本擁有橙色真珠，卻因悲傷與憤怒一度投靠反派凱特的人魚公主是？",
                questionImg: "", 
                options: [
                    { text: "", img: "coco.jpg" },
                    { text: "", img: "沙羅.jpg" },
                    { text: "", img: "星羅.jpg" },
                    { text: "", img: "麗娜.jpg" }
                ],
                correct: 1
            },
            {
                question: "第 10 題：【終極鐵粉題】小波在陸地上與反派水妖「悠莉」相戀，請問小波的真實幻獸身分是？",
                questionImg: "", 
                options: [
                    { text: "海馬" },
                    { text: "獨角獸"},
                    { text: "企鵝"},
                    { text: "飛馬（神獸希波卡帕斯）"}
                ],
                correct: 3
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let canAnswer = true;

        const questionNumEl = document.getElementById('question-number');
        const progressEl = document.getElementById('progress');
        const questionEl = document.getElementById('question');
        const optionsContainer = document.getElementById('options-container');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const scoreEl = document.getElementById('score');
        const commentEl = document.getElementById('comment');

        function initGame() {
            currentQuestionIndex = 0;
            score = 0;
            canAnswer = true;
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
            const audio = document.getElementById('bgm');
            audio.play().catch(() => {});
        }

        function loadQuestion() {
            canAnswer = true;
            const currentQuiz = quizData[currentQuestionIndex];
            
            questionNumEl.innerText = `第 ${currentQuestionIndex + 1} / ${quizData.length} 題`;
            const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
            progressEl.style.width = `${progressPercent}%`;
            questionEl.innerText = currentQuiz.question;

            // 處理題目圖片
            const quizImgEl = document.getElementById('quiz-image');
            const imgBlock = document.getElementById('question-img-block');
            if (currentQuiz.questionImg && currentQuiz.questionImg.trim() !== "") {
                quizImgEl.src = currentQuiz.questionImg;
                imgBlock.style.display = 'flex';
            } else {
                quizImgEl.src = "";
                imgBlock.style.display = 'none';
            }

            // 生成選項
            optionsContainer.innerHTML = '';
            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('btn-img-option');
                
                const img = document.createElement('img');
                img.classList.add('option-img');
                img.src = option.img;
                img.alt = "選項圖片";
                button.appendChild(img);
                
                // 只有當 text 有內容時才渲染文字
                if (option.text && option.text.trim() !== "") {
                    const label = document.createElement('div');
                    label.classList.add('option-label');
                    label.innerText = option.text;
                    button.appendChild(label);
                }
                
                button.addEventListener('click', () => selectAnswer(index, button));
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex, selectedButton) {
            if (!canAnswer) return;
            canAnswer = false;
            const currentQuiz = quizData[currentQuestionIndex];
            const allButtons = optionsContainer.querySelectorAll('.btn-img-option');

            if (selectedIndex === currentQuiz.correct) {
                selectedButton.classList.add('correct');
                score += Math.round(100 / quizData.length);
            } else {
                selectedButton.classList.add('wrong');
                allButtons[currentQuiz.correct].classList.add('correct');
            }

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) { loadQuestion(); } else { showResults(); }
            }, 1500);
        }

        function showResults() {
            if (score > 100 || (currentQuestionIndex === quizData.length && score >= 95)) { score = 100; }
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            scoreEl.innerText = `${score} 分`;

            let comment = "";
            if (score === 100) { comment = "太強了！你就是真珠美人魚大師！<br>『閃亮的歌聲開始大合唱！』"; }
            else if (score >= 60) { comment = "不錯喔！童年回憶有好好保存著。"; }
            else { comment = "哎呀，看來你被凱特用黑暗結界迷惑了心智！"; }
            commentEl.innerHTML = comment;
        }

        function restartGame() { initGame(); }
        initGame();
    </script>
</body>
</html>
