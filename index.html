<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真珠美人魚閃亮問答挑戰！</title>
    <style>
        :root {
            --pink-primary: #ff85a2;
            --pink-light: #ffb3c6;
            --blue-ocean: #a2d2ff;
            --yellow-soft: #fff3b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background: linear-gradient(135deg, var(--blue-ocean), #e8cbf5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 25px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 4px solid var(--pink-light);
        }

        h1 {
            color: var(--pink-primary);
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #777;
            font-size: 13px;
            margin-bottom: 15px;
        }

        /* 播放器區塊 */
        .audio-container {
            background-color: #fff0f5;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px dashed var(--pink-primary);
        }
        .audio-container p {
            margin: 0 0 5px 0;
            font-size: 12px;
            color: var(--pink-primary);
            font-weight: bold;
        }
        audio {
            width: 100%;
            height: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #eee;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--pink-primary), var(--pink-light));
            transition: width 0.3s ease;
        }

        /* 圖片容器 */
        .image-container {
            width: 100%;
            height: 200px;
            background-color: #f5f5f5;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #eee;
        }

        .question-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 圖片會自動填滿並裁剪 */
            display: none; /* 沒圖片時隱藏 */
        }

        .question-box {
            font-size: 17px;
            font-weight: bold;
            color: #444;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .btn-option {
            background-color: white;
            border: 2px solid var(--pink-light);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #555;
            font-weight: 500;
        }

        .btn-option:hover {
            background-color: var(--pink-light);
            color: white;
            transform: translateY(-2px);
        }

        .btn-option.correct {
            background-color: #a7c957 !important;
            border-color: #a7c957 !important;
            color: white !important;
        }

        .btn-option.wrong {
            background-color: #f28482 !important;
            border-color: #f28482 !important;
            color: white !important;
        }

        .result-screen {
            display: none;
        }

        .score-text {
            font-size: 48px;
            font-weight: bold;
            color: var(--pink-primary);
            margin: 20px 0;
        }

        .comment-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-restart {
            background-color: var(--pink-primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-screen">
            <h1>用閃亮的歌聲開始大合唱！</h1>
            <div class="subtitle" id="question-number">第 1 / 5 題</div>
            
            <div class="audio-container">
                <p>🎵 背景音樂（可手動播放/調整音量）</p>
                <audio id="bgm" controls loop>
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
                    您的瀏覽器不支援音樂播放。
                </audio>
            </div>
            
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

            <div class="image-container">
                <img id="quiz-image" class="question-img" src="" alt="題目圖片">
                <span id="img-placeholder" style="color: #999; font-size: 14px;">（本題無圖片）</span>
            </div>

            <div class="question-box" id="question">題目載入中...</div>

            <div class="options-container" id="options"></div>
        </div>

        <div id="result-screen" class="result-screen">
            <h1>測驗結束！</h1>
            <div class="score-text" id="score">0 分</div>
            <div class="comment-text" id="comment">評價載入中...</div>
            <button class="btn-restart" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 題庫設定：新增了 image 欄位，可以放入圖片的網址
        const quizData = [
            {
                question: "請問北太平洋的人魚公主，同時也是本作的女主角是誰？",
                options: ["寶生波音", "七海露亞", "洞院風真", "織本沙羅"],
                correct: 1,
                image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500" // 範例圖，可換成露亞的圖
            },
            {
                question: "填空題：『七彩的微風 側臉的微風 ______ 哼著歌 飛向遙遠的彼方』",
                options: ["張開雙手", "抬起頭來", "心中的旋律", "藍色風暴"],
                correct: 2,
                image: "" // 沒填網址的話，會自動顯示「本題無圖片」
            },
            {
                question: "擁有「紫色真珠」，性格冷酷內斂、一開始不願加入大家的南極海人魚公主是？",
                options: ["香蓮", "諾威爾", "可可", "香蓮的姊曬"],
                correct: 0,
                image: "https://images.unsplash.com/photo-1506157786151-b8491531f063?w=500" // 範例圖
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let canAnswer = true;

        const questionNumEl = document.getElementById('question-number');
        const progressEl = document.getElementById('progress');
        const questionEl = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const scoreEl = document.getElementById('score');
        const commentEl = document.getElementById('comment');
        const quizImgEl = document.getElementById('quiz-image');
        const imgPlaceholderEl = document.getElementById('img-placeholder');

        function initGame() {
            currentQuestionIndex = 0;
            score = 0;
            canAnswer = true;
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
            
            // 嘗試自動播放音樂（部分瀏覽器會因安全機制阻擋，需要玩家手動點播放）
            const audio = document.getElementById('bgm');
            audio.play().catch(() => { console.log("等待玩家手動播放音樂"); });
        }

        function loadQuestion() {
            canAnswer = true;
            const currentQuiz = quizData[currentQuestionIndex];
            
            questionNumEl.innerText = `第 ${currentQuestionIndex + 1} / ${quizData.length} 題`;
            const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
            progressEl.style.width = `${progressPercent}%`;

            questionEl.innerText = currentQuiz.question;

            // 處理圖片顯示邏輯
            if (currentQuiz.image && currentQuiz.image.trim() !== "") {
                quizImgEl.src = currentQuiz.image;
                quizImgEl.style.display = 'block';
                imgPlaceholderEl.style.display = 'none';
            } else {
                quizImgEl.src = "";
                quizImgEl.style.display = 'none';
                imgPlaceholderEl.style.display = 'block';
            }

            optionsContainer.innerHTML = '';
            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('btn-option');
                button.innerText = option;
                button.addEventListener('click', () => selectAnswer(index, button));
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex, selectedButton) {
            if (!canAnswer) return;
            canAnswer = false;

            const currentQuiz = quizData[currentQuestionIndex];
            const allButtons = optionsContainer.querySelectorAll('.btn-option');

            if (selectedIndex === currentQuiz.correct) {
                selectedButton.classList.add('correct');
                score += Math.round(100 / quizData.length);
            } else {
                selectedButton.classList.add('wrong');
                allButtons[currentQuiz.correct].classList.add('correct');
            }

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            if (score > 100 || (currentQuestionIndex === quizData.length && score >= 95)) {
                score = 100;
            }
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            scoreEl.innerText = `${score} 分`;

            let comment = "";
            if (score === 100) {
                comment = "太強了！你就是真珠美人魚大師！<br>『閃亮的歌聲開始大合唱！』";
            } else if (score >= 60) {
                comment = "不錯喔！童年回憶有好好保存著。";
            } else {
                comment = "哎呀，看來你被凱特用黑暗結界迷惑了心智！";
            }
            commentEl.innerHTML = comment;
        }

        function restartGame() {
            initGame();
        }

        initGame();
    </script>
</body>
</html>
