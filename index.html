<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真珠美人魚閃亮問答挑戰！</title>
    <style>
        :root {
            --pink-primary: #ff85a2;
            --pink-light: #ffb3c6;
            --blue-ocean: #a2d2ff;
            --yellow-soft: #fff3b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background: linear-gradient(135deg, var(--blue-ocean), #e8cbf5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 25px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 4px solid var(--pink-light);
        }

        h1 {
            color: var(--pink-primary);
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #777;
            font-size: 13px;
            margin-bottom: 15px;
        }

        /* 播放器區塊 */
        .audio-container {
            background-color: #fff0f5;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px dashed var(--pink-primary);
        }
        .audio-container p {
            margin: 0 0 5px 0;
            font-size: 12px;
            color: var(--pink-primary);
            font-weight: bold;
        }
        audio {
            width: 100%;
            height: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #eee;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--pink-primary), var(--pink-light));
            transition: width 0.3s ease;
        }

        .question-box {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 圖片選項：改成 2x2 的網格網格佈局 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        /* 圖片按鈕樣式 */
