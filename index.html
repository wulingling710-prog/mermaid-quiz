<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真珠美人魚閃亮問答挑戰！</title>
    <style>
        :root {
            --pink-primary: #ff85a2;
            --pink-light: #ffb3c6;
            --blue-ocean: #a2d2ff;
            --yellow-soft: #fff3b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background: linear-gradient(135deg, var(--blue-ocean), #e8cbf5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 4px solid var(--pink-light);
        }

        h1 {
            color: var(--pink-primary);
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--pink-primary), var(--pink-light));
            transition: width 0.3s ease;
        }

        .question-box {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin-bottom: 25px;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn-option {
            background-color: white;
            border: 2px solid var(--pink-light);
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #555;
            font-weight: 500;
        }

        .btn-option:hover {
            background-color: var(--pink-light);
            color: white;
            transform: translateY(-2px);
        }

        .btn-option:active {
            transform: translateY(0);
        }

        /* 答案反饋樣式 */
        .btn-option.correct {
            background-color: #a7c957 !important;
            border-color: #a7c957 !important;
            color: white !important;
        }

        .btn-option.wrong {
            background-color: #f28482 !important;
            border-color: #f28482 !important;
            color: white !important;
        }

        /* 結果畫面 */
        .result-screen {
            display: none;
        }

        .score-text {
            font-size: 48px;
            font-weight: bold;
            color: var(--pink-primary);
            margin: 20px 0;
        }

        .comment-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-restart {
            background-color: var(--pink-primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-restart:hover {
            background-color: #ff6b8b;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-screen">
            <h1 id="title-text">用閃亮的歌聲開始大合唱！</h1>
            <div class="subtitle" id="question-number">第 1 / 5 題</div>
            
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

            <div class="question-box" id="question">
                題目載入中...
            </div>

            <div class="options-container" id="options">
                </div>
        </div>

        <div id="result-screen" class="result-screen">
            <h1>測驗結束！</h1>
            <div class="score-text" id="score">0 分</div>
            <div class="comment-text" id="comment">評價載入中...</div>
            <button class="btn-restart" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 題庫設定：你可以自由修改這裡的題目、選項、和正確答案(索引從0開始算)
        const quizData = [
            {
                question: "請問北太平洋的人魚公主，同時也是本作的女主角是誰？",
                options: ["寶生波音", "七海露亞", "洞院風真", "織本沙羅"],
                correct: 1
            },
            {
                question: "填空題：『七彩的微風 側臉的微風 ______ 哼著歌 飛向遙遠的彼方』",
                options: ["張開雙手", "抬起頭來", "心中的旋律", "藍色風暴"],
                correct: 2
            },
            {
                question: "擁有「紫色真珠」，性格冷酷內斂、一開始不願加入大家的南極海人魚公主是？",
                options: ["香蓮", "諾威爾", "可可", "香蓮的姊姊"],
                correct: 0
            },
            {
                question: "反派「黑美人姐妹花」中，總是穿著黑色衣服、負責唱歌和吐槽妹妹的姐姐叫什麼？",
                options: ["瑪莉亞", "秀秀", "咪咪", "愛莉爾"],
                correct: 1
            },
            {
                question: "當人魚公主們擊敗水妖時，最經典的安可口號是下面哪一句？",
                ...{"options": ["閃亮的歌聲開始大合唱！", "要不要來一首安可曲？", "愛的雨下個不停！", "用閃亮的歌聲，送你回大海！"]},
                correct: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let canAnswer = true; // 防止重複點擊

        const questionNumEl = document.getElementById('question-number');
        const progressEl = document.getElementById('progress');
        const questionEl = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const scoreEl = document.getElementById('score');
        const commentEl = document.getElementById('comment');

        // 初始化遊戲
        function initGame() {
            currentQuestionIndex = 0;
            score = 0;
            canAnswer = true;
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
        }

        // 載入題目
        function loadQuestion() {
            canAnswer = true;
            const currentQuiz = quizData[currentQuestionIndex];
            
            // 更新進度文字與進度條
            questionNumEl.innerText = `第 ${currentQuestionIndex + 1} / ${quizData.length} 題`;
            const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
            progressEl.style.width = `${progressPercent}%`;

            // 顯示題目
            questionEl.innerText = currentQuiz.question;

            // 清空舊選項並生成新選項
            optionsContainer.innerHTML = '';
            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('btn-option');
                button.innerText = option;
                button.addEventListener('click', () => selectAnswer(index, button));
                optionsContainer.appendChild(button);
            });
        }

        // 選擇答案後的處理
        function selectAnswer(selectedIndex, selectedButton) {
            if (!canAnswer) return;
            canAnswer = false;

            const currentQuiz = quizData[currentQuestionIndex];
            const allButtons = optionsContainer.querySelectorAll('.btn-option');

            // 檢查是否正確
            if (selectedIndex === currentQuiz.correct) {
                selectedButton.classList.add('correct');
                score += Math.round(100 / quizData.length); // 依題目數量均分分數
            } else {
                selectedButton.classList.add('wrong');
                // 順便把正確的亮出來給玩家看
                allButtons[currentQuiz.correct].classList.add('correct');
            }

            // 延遲 1.5 秒自動進下一題，讓玩家看清答案
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        // 顯示結果
        function showResults() {
            // 四捨五入最後分數，如果全對就直接給 100
            if (score > 100 || currentQuestionIndex === quizData.length && score >= 95) {
                score = 100;
            }

            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            scoreEl.innerText = `${score} 分`;

            // 根據分數給予不同評價
            let comment = "";
            if (score === 100) {
                comment = "太強了！你就是真珠美人魚大師！<br>『閃亮的歌聲開始大合唱！』快去海邊呼喚你的真珠吧！";
            } else if (score >= 60) {
                comment = "不錯喔！童年回憶有好好保存著。<br>看來你對露亞她們的歌曲還是挺熟悉的！";
            } else {
                comment = "哎呀，看來你被凱特用黑暗結界迷惑了心智！<br>快去回去重聽一遍《七彩的微風》找回記憶吧！";
            }
            commentEl.innerHTML = comment;
        }

        // 重新開始
        function restartGame() {
            initGame();
        }

        // 網頁載入時自動執行
        initGame();
    </script>
</body>
</html>
