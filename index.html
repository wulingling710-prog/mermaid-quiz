<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真珠美人魚閃亮問答挑戰！</title>
    <style>
        :root {
            --pink-primary: #ff85a2;
            --pink-light: #ffb3c6;
            --blue-ocean: #a2d2ff;
            --yellow-soft: #fff3b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background: linear-gradient(135deg, var(--blue-ocean), #e8cbf5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 25px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 4px solid var(--pink-light);
        }

        h1 {
            color: var(--pink-primary);
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #777;
            font-size: 13px;
            margin-bottom: 15px;
        }

        /* 播放器區塊 */
        .audio-container {
            background-color: #fff0f5;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px dashed var(--pink-primary);
        }
        .audio-container p {
            margin: 0 0 5px 0;
            font-size: 12px;
            color: var(--pink-primary);
            font-weight: bold;
        }
        audio {
            width: 100%;
            height: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #eee;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--pink-primary), var(--pink-light));
            transition: width 0.3s ease;
        }

        .question-box {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 圖片選項：改成 2x2 的網格網格佈局 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        /* 圖片按鈕樣式 */
        .btn-img-option {
            background-color: white;
            border: 3px solid var(--pink-light);
            border-radius: 15px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-img-option:hover {
            border-color: var(--pink-primary);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* 選項內的圖片 */
        .option-img {
            width: 100%;
            height: 140px; /* 固定高度，讓四張圖一樣大 */
            object-fit: cover; /* 圖片自動裁剪填滿 */
            border-radius: 10px;
            background-color: #f5f5f5;
        }

        /* 選項下的文字標籤 */
        .option-label {
            margin-top: 8px;
            font-size: 15px;
            font-weight: bold;
            color: #555;
        }

        /* 答對與答錯的邊框顏色反饋 */
        .btn-img-option.correct {
            border-color: #a7c957 !important;
            background-color: #f4f9e9;
        }
        .btn-img-option.correct .option-label {
            color: #6a994e;
        }

        .btn-img-option.wrong {
            border-color: #f28482 !important;
            background-color: #ffeef0;
        }
        .btn-img-option.wrong .option-label {
            color: #e63946;
        }

        .result-screen {
            display: none;
        }

        .score-text {
            font-size: 48px;
            font-weight: bold;
            color: var(--pink-primary);
            margin: 20px 0;
        }

        .comment-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-restart {
            background-color: var(--pink-primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-screen">
            <h1>用閃亮的歌聲開始大合唱！</h1>
            <div class="subtitle" id="question-number">第 1 / 3 題</div>
            
            <div class="audio-container">
                <p>🎵 背景音樂（可手動播放/調整音量）</p>
                <audio id="bgm" controls loop>
                    <source src="bgm.mp3" type="audio/mp3">
                    您的瀏覽器不支援音樂播放。
                </audio>
            </div>
            
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

            <div class="question-box" id="question">題目載入中...</div>

            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="result-screen" class="result-screen">
            <h1>測驗結束！</h1>
            <div class="score-text" id="score">0 分</div>
            <div class="comment-text" id="comment">評價載入中...</div>
            <button class="btn-restart" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 題庫設定：這版改為純「圖片選項」
        // 每一個選項包含：text（文字標籤）和 img（該選項的圖片網址/檔名）
        const quizData = [
            {
                question: "請問誰是本故事的主人翁(北太平洋公主)？",
                options: [
                    { text: https://www.facebook.com/pichipichipitch.fans.tw/posts/%E4%BB%A5%E5%89%8D%E7%95%AB%E9%81%8E%E7%9C%9F%E7%8F%A0%E7%BE%8E%E4%BA%BA%E9%AD%9A%E7%BE%A9%E5%A4%A7%E5%88%A9%E5%AE%98%E6%96%B9%E9%80%B1%E9%82%8A%E5%9C%96%E7%9A%84%E7%B9%AA%E5%B8%AB%E7%94%A8%E4%B8%8D%E5%90%8C%E9%A2%A8%E6%A0%BC%E9%87%8D%E6%96%B0%E7%95%AB%E4%BA%86%E6%96%B0%E8%A3%9D%E7%89%88%E6%BC%AB%E7%95%AB%E5%B0%81%E9%9D%A2%E5%A5%BD%E5%8F%AF%E6%84%9B%E7%9A%84%E9%9C%B2%E4%BA%9E/855477476588945/ },
                    { text: "寶生波音", img: "hanon.jpg" },
                    { text: "洞院莉娜", img: "rina.jpg" },
                    { text: "香蓮", img: "karen.jpg" }
                ],
                correct: 1 // 答案是第二個（波音），所以填 1
            },
            {
                question: "以下哪一位是總是穿著黑色衣服的反派「黑美人姐妹花」的姐姐秀秀？",
                options: [
                    { text: "瑪莉亞", img: "maria.jpg" },
                    { text: "咪咪", img: "mimi.jpg" },
                    { text: "秀秀", img: "sheshe.jpg" },
                    { text: "愛莉爾", img: "eriru.jpg" }
                ],
                correct: 2
            },
            {
                question: "請問哪一隻是露亞身邊的守護企鵝小波？",
                options: [
                    { text: "小波", img: "hippo.jpg" },
                    { text: "庫拉叔叔", img: "kura.jpg" },
                    { text: "小渚", img: "nagisa.jpg" },
                    { text: "海斗", img: "kaito.jpg" }
                ],
                correct: 0
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let canAnswer = true;

        const questionNumEl = document.getElementById('question-number');
        const progressEl = document.getElementById('progress');
        const questionEl = document.getElementById('question');
        const optionsContainer = document.getElementById('options-container');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const scoreEl = document.getElementById('score');
        const commentEl = document.getElementById('comment');

        function initGame() {
            currentQuestionIndex = 0;
            score = 0;
            canAnswer = true;
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
            
            const audio = document.getElementById('bgm');
            audio.play().catch(() => { console.log("等待玩家手動播放音樂"); });
        }

        function loadQuestion() {
            canAnswer = true;
            const currentQuiz = quizData[currentQuestionIndex];
            
            questionNumEl.innerText = `第 ${currentQuestionIndex + 1} / ${quizData.length} 題`;
            const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
            progressEl.style.width = `${progressPercent}%`;

            questionEl.innerText = currentQuiz.question;

            // 清空舊選項並動態生成 2x2 圖片按鈕
            optionsContainer.innerHTML = '';
            currentQuiz.options.forEach((option, index) => {
                // 建立按鈕主體
                const button = document.createElement('button');
                button.classList.add('btn-img-option');
                
                // 建立按鈕內的圖片
                const img = document.createElement('img');
                img.classList.add('option-img');
                img.src = option.img;
                img.alt = option.text;
                
                // 建立按鈕內的文字標籤
                const label = document.createElement('div');
                label.classList.add('option-label');
                label.innerText = option.text;
                
                // 組合按鈕並放入容器
                button.appendChild(img);
                button.appendChild(label);
                button.addEventListener('click', () => selectAnswer(index, button));
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex, selectedButton) {
            if (!canAnswer) return;
            canAnswer = false;

            const currentQuiz = quizData[currentQuestionIndex];
            const allButtons = optionsContainer.querySelectorAll('.btn-img-option');

            if (selectedIndex === currentQuiz.correct) {
                selectedButton.classList.add('correct');
                score += Math.round(100 / quizData.length);
            } else {
                selectedButton.classList.add('wrong');
                allButtons[currentQuiz.correct].classList.add('correct');
            }

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            if (score > 100 || (currentQuestionIndex === quizData.length && score >= 95)) {
                score = 100;
            }
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            scoreEl.innerText = `${score} 分`;

            let comment = "";
            if (score === 100) {
                comment = "太強了！你就是真珠美人魚大師！<br>『閃亮的歌聲開始大合唱！』";
            } else if (score >= 60) {
                comment = "不錯喔！童年回憶有好好保存著。";
            } else {
                comment = "哎呀，看來你被凱特用黑暗結界迷惑了心智！";
            }
            commentEl.innerHTML = comment;
        }

        function restartGame() {
            initGame();
        }

        initGame();
    </script>
</body>
</html>
